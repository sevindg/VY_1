<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пазл для детей: Собери персонажа</title>
    <style>
        :root {
            --board-width: 300px;
            --board-height: 400px;
            --cols: 3;
            --rows: 4;
            --piece-width: calc(var(--board-width) / var(--cols));
            --piece-height: calc(var(--board-height) / var(--rows));
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        h1 { color: #333; }

        .preview-image {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 80px;
            height: auto;
            border: 2px solid #e91e63;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            object-fit: contain;
            background-color: white;
            padding: 3px;
            z-index: 100;
        }

        .game-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board {
            width: var(--board-width);
            height: var(--board-height);
            border: 4px dashed #ccc;
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            grid-template-rows: repeat(var(--rows), 1fr);
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .drop-zone {
            width: 100%;
            height: 100%;
            border: 1px solid #eee;
            box-sizing: border-box;
        }

        .pieces-container {
            width: calc(var(--board-width) * 1.2);
            min-height: var(--board-height);
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .piece {
            width: var(--piece-width);
            height: var(--piece-height);
            background-image: url('image.png');
            background-size: var(--board-width) var(--board-height);
            cursor: grab;
            border: 1px solid #fff;
            box-sizing: border-box;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s, opacity 0.1s;
        }

        .piece:active { cursor: grabbing; transform: scale(1.05); }
        .drag-over { background-color: #ffe6eb; }

        #message {
            margin-top: 30px;
            font-size: 26px;
            font-weight: bold;
            color: #c2185b;
            display: none;
            background-color: #ffe6eb;
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #c2185b;
            text-align: center;
            max-width: 600px;
        }

        .controls { margin-top: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover { background-color: #c2185b; }
    </style>
</head>
<body>

    <img src="image.png" alt="Подсказка: итоговая картинка" class="preview-image">

    <h1>Собери персонажа</h1>
    <div class="controls">
        <button onclick="initGame()">Перемешать и начать заново</button>
    </div>

    <div class="game-container">
        <div class="board" id="board"></div>
        <div class="pieces-container" id="pieces"></div>
    </div>

    <div id="message">Отличная работа! Герой собран, пора отправлять письмо! 🎉</div>

    <script>
        const cols = 3;
        const rows = 4;
        const totalPieces = cols * rows; 

        const board = document.getElementById('board');
        const piecesContainer = document.getElementById('pieces');
        const message = document.getElementById('message');

        let draggedPiece = null;

        function initGame() {
            board.innerHTML = '';
            piecesContainer.innerHTML = '';
            message.style.display = 'none';

            let pieces = [];

            for (let i = 0; i < totalPieces; i++) {
                // Создаем ячейку
                const dropZone = document.createElement('div');
                dropZone.classList.add('drop-zone');
                dropZone.dataset.index = i;
                
                dropZone.addEventListener('dragover', handleDragOver);
                dropZone.addEventListener('dragenter', handleDragEnter);
                dropZone.addEventListener('dragleave', handleDragLeave);
                dropZone.addEventListener('drop', handleDrop);
                
                board.appendChild(dropZone);

                // Создаем кусочек пазла
                const piece = document.createElement('div');
                piece.classList.add('piece');
                piece.draggable = true;
                piece.dataset.index = i;
                piece.id = `piece-${i}`;

                const col = i % cols;
                const row = Math.floor(i / cols);
                const bgX = (col * 100 / (cols - 1)) || 0;
                const bgY = (row * 100 / (rows - 1)) || 0;
                piece.style.backgroundPosition = `${bgX}% ${bgY}%`;

                piece.addEventListener('dragstart', handleDragStart);
                piece.addEventListener('dragend', handleDragEnd);

                pieces.push(piece);
            }

            pieces = pieces.sort(() => Math.random() - 0.5);
            pieces.forEach(p => piecesContainer.appendChild(p));
            
            piecesContainer.addEventListener('dragover', handleDragOver);
            piecesContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedPiece) piecesContainer.appendChild(draggedPiece);
            });
        }

        // --- Drag & Drop логика ---

        function handleDragStart(e) {
            draggedPiece = this;
            setTimeout(() => this.style.opacity = '0.5', 0);
        }

        function handleDragEnd() {
            if (draggedPiece) {
                draggedPiece.style.opacity = '1';
                draggedPiece = null;
            }
            checkWin();
        }

        function handleDragOver(e) { e.preventDefault(); }

        function handleDragEnter(e) {
            e.preventDefault();
            // Подсвечиваем ячейку, только если она пустая
            if (this.classList.contains('drop-zone') && !this.hasChildNodes()) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave() { this.classList.remove('drag-over'); }

        // ОБНОВЛЕННАЯ ЛОГИКА СБРОСА КУСОЧКА
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            if (this.classList.contains('drop-zone')) {
                // Если индекс ячейки совпадает с индексом кусочка (правильное место)
                if (this.dataset.index === draggedPiece.dataset.index) {
                    this.appendChild(draggedPiece);
                    
                    // Убираем возможность перетаскивать кусочек дальше (он намертво встает на место)
                    draggedPiece.draggable = false;
                    draggedPiece.style.cursor = 'default';
                    // Убираем рамку для бесшовности собранной картинки
                    draggedPiece.style.border = 'none'; 
                } else {
                    // Если место неверное — возвращаем кусочек обратно в контейнер с пазлами
                    piecesContainer.appendChild(draggedPiece);
                }
            }
        }

        function checkWin() {
            // Если в контейнере с разбросанными деталями ничего не осталось — это победа,
            // так как мы разрешаем ставить детали ТОЛЬКО на их правильные места
            if (piecesContainer.children.length === 0) {
                message.style.display = 'block';
            }
        }

        initGame();
    </script>
</body>
</html>
